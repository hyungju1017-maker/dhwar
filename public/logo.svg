<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nanum+Brush+Script&amp;display=swap');
    </style>
    <filter id="brush" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <text
    x="300"
    y="110"
    text-anchor="middle"
    font-family="'Nanum Brush Script', cursive"
    font-size="120"
    fill="white"
    filter="url(#brush)"
    style="letter-spacing: 0.08em;"
  >大學大戰</text>
</svg>
